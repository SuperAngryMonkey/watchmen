## apcupsd.conf v1.1 ##
## apcupsd-lab4.conf — apcupsd instance for lab UPS #1
## Loaded by: systemctl start apcupsd@lab4

UPSNAME      lab4
UPSCABLE     usb
UPSTYPE      usb

# DEVICE is intentionally left blank for USB.
# apcupsd will scan /dev/usb/hiddev* and claim the first unlocked one.
# The per-instance LOCKFILE below ensures each daemon grabs a different UPS
# when multiple instances start simultaneously.
#
# If you have >1 UPS and need deterministic pinning (not just whichever one
# comes up first), use the udev SERIAL match to create /dev/ups-labN-hid
# symlinks and uncomment the DEVICE line here:
# DEVICE /dev/ups-lab4-hid
DEVICE

POLLTIME     30
LOCKFILE     /var/lock
SCRIPTDIR    /etc/apcupsd
PWRFAILDIR   /etc/apcupsd
NOLOGINDIR   /etc

# Power failure behavior — lab values, tune for production
ONBATTERYDELAY  6
BATTERYLEVEL    15
MINUTES         5
TIMEOUT         0
ANNOY           300
ANNOYDELAY      60
NOLOGON         disable
KILLDELAY       0

# Network Information Server — each instance must use a DIFFERENT port
NETSERVER    on
NISIP        127.0.0.1
NISPORT      3554

EVENTSFILE     /var/log/apcupsd-lab4.events
EVENTSFILEMAX  10

# Stats — one file per instance
STATTIME     0
STATFILE     /var/log/apcupsd-lab4.status
LOGSTATS     off
DATATIME     0

# Upload for UPS master/slave coordination (not used in single-host lab)
UPSCLASS     standalone
UPSMODE      disable
