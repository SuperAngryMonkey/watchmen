# /etc/mosquitto/conf.d/websockets.conf
#
# Adds a WebSocket listener on port 9001 for the WATCHMEN dashboard.
# The native MQTT listener on 1883 remains for the bridge and other services.

# Native MQTT (bridge connects here)
listener 1883 127.0.0.1
protocol mqtt

# WebSocket MQTT (browser dashboard connects here)
listener 9001
protocol websockets

# Lab defaults — no auth for local-only use. When you deploy to customer
# sites, set allow_anonymous false and configure per-client passwords:
#   allow_anonymous false
#   password_file /etc/mosquitto/passwd
allow_anonymous true

# Log to journal
log_dest stdout
log_type error
log_type warning
log_type notice
